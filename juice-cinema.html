<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juice Cinema • v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* (keep all existing v3 styles - abbreviated here for patch; full styles from previous push remain) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        :root { --cinema-gold: #d4af37; }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif; font-weight: 600; letter-spacing: -0.02em; }
        .cinema-bg { background: radial-gradient(circle at center, #111113 0%, #0a0a0f 100%); }
        .film-grain { position: relative; }
        .film-grain::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px); background-size: 3px 3px; pointer-events: none; z-index: 1; animation: grain 0.8s steps(1) infinite; }
        @keyframes grain { 0% { transform: translate(0, 0); } 10% { transform: translate(-1px, 1px); } 20% { transform: translate(1px, -1px); } 30% { transform: translate(-1px, -1px); } 40% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, 1px); } 60% { transform: translate(1px, -1px); } 70% { transform: translate(-1px, -1px); } 80% { transform: translate(1px, 1px); } 90% { transform: translate(-1px, 1px); } 100% { transform: translate(0, 0); } }
        .scanline { position: relative; }
        .scanline::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.04) 51%, transparent 52%); background-size: 100% 6px; pointer-events: none; z-index: 2; animation: scan 4s linear infinite; }
        .cinema-card { background: #111113; border: 1px solid #27272a; box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4); }
        .section-header { font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; color: #71717a; }
        .neon-button { transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1); position: relative; overflow: hidden; }
        .neon-button::before { content: ''; position: absolute; top: 0; left: -100%; width: 40%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent); transition: 0.6s; }
        .neon-button:hover::before { left: 250%; }
        .retouch-btn { background: linear-gradient(135deg, #d4af37, #b8972e); color: #111113; font-weight: 700; letter-spacing: 0.5px; box-shadow: 0 10px 15px -3px rgb(212 175 55 / 0.3), 0 4px 6px -4px rgb(212 175 55 / 0.3); }
        .audio-dropzone { transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1); }
        .audio-dropzone.dragover { border-color: #d4af37; background-color: rgba(212, 175, 55, 0.05); transform: scale(1.01); }
        .preset-card { transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1); border: 2px solid transparent; }
        .preset-card.active { border-color: #d4af37; background-color: rgba(212, 175, 55, 0.08); box-shadow: 0 0 0 1px #d4af37; }
        .queue-item { transition: all 0.15s ease; }
        .film-burn { position: absolute; inset: 0; pointer-events: none; z-index: 20; background: linear-gradient(to right, rgba(139, 69, 19, 0.25) 0%, transparent 4%, transparent 96%, rgba(139, 69, 19, 0.25) 100%), linear-gradient(to bottom, rgba(139, 69, 19, 0.18) 0%, transparent 2%, transparent 98%, rgba(139, 69, 19, 0.18) 100%); animation: burn-flicker 1.2s infinite alternate ease-in-out; box-shadow: inset 0 0 80px rgba(139, 69, 19, 0.15); }
        @keyframes burn-flicker { 0% { opacity: 0.7; filter: brightness(1.05) contrast(1.1); } 100% { opacity: 1; filter: brightness(0.92) contrast(0.95); } }
        .stem-slider { accent-color: #d4af37; }
    </style>
</head>
<body class="cinema-bg text-zinc-200 min-h-screen pb-12">
    <!-- Header -->
    <div class="max-w-5xl mx-auto px-6 pt-8 pb-6">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="flex items-center gap-x-3">
                    <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-amber-400 to-yellow-600 flex items-center justify-center shadow-inner">
                        <i class="fa-solid fa-film text-[#111113] text-3xl"></i>
                    </div>
                    <div>
                        <div class="font-display text-4xl tracking-tighter font-semibold">JUICE</div>
                        <div class="font-display text-3xl tracking-[-2.5px] text-amber-400 -mt-2">CINEMA <span class="text-xs align-super text-amber-300">v3</span></div>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-x-3 text-xs">
                <div class="px-3 py-1.5 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center gap-x-2">
                    <i class="fa-solid fa-user text-emerald-400"></i>
                    <span id="currentProfile" class="font-mono text-emerald-400 text-[10px] tracking-widest">PROFILE: DEFAULT</span>
                </div>
                <div class="px-3 py-1.5 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center gap-x-2">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                    <span class="font-mono text-emerald-400 text-[10px] tracking-widest">NFC RITUAL v3</span>
                    <span id="nfcTapCounter" class="font-mono text-emerald-300 text-[10px]">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6">
        <!-- (keep the rest of the v3 UI structure exactly as before - dropzone, presets, voice, stem mixer, reflection logs, etc.) -->
        <!-- For brevity in this patch, the full body content from the previous v3 push remains unchanged except for NFC wiring -->
        <div class="cinema-card rounded-3xl p-8 film-grain scanline">
            <!-- Multi-Profile Info, Room Presets, NFC Programming, Dropzone, Voice Note, Main Button, Stem Mixer, Reflection Logs sections remain as in v3 -->
            <!-- ... (existing content) ... -->
        </div>
    </div>

    <!-- Processing Modal remains unchanged -->
    <div id="processingModal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-6">
        <!-- (existing modal content) -->
    </div>

    <div id="toastContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] flex flex-col gap-y-2 items-center"></div>

    <!-- Load modular NFC manager first -->
    <script src="nfc-manager.js"></script>

    <script>
        // ==================== v3 CORE (with NFCManager integration) ====================
        let nfcManager = null;

        function initTailwind() { /* existing */ }

        const roomPresets = { /* existing v3 presets */ };

        let selectedPreset = 'scoring-stage';
        let processingQueue = [];
        let voiceNoteBlob = null;
        let lastProcessedOutputs = [];
        let currentStemMixer = null;
        let currentProfile = 'default';
        let reflectionLogs = [];

        function initProfile() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('profile')) currentProfile = params.get('profile').toLowerCase().replace(/[^a-z0-9]/g, '');
            document.getElementById('currentProfile').textContent = `PROFILE: ${currentProfile.toUpperCase()}`;
            
            // Initialize the clean NFCManager for this profile
            nfcManager = new NFCManager(currentProfile);
            nfcManager.updateTapCounterUI('nfcTapCounter');
            
            loadProfileData();
        }

        // Replace old requestNFCAuth with manager
        async function requestNFCAuth(forRitual = false) {
            if (!nfcManager) nfcManager = new NFCManager(currentProfile);
            return nfcManager.requestAuth(forRitual);
        }

        async function writePresetToNFC() {
            const select = document.getElementById('writePresetSelect');
            const key = select.value;
            if (!nfcManager) nfcManager = new NFCManager(currentProfile);
            const success = await nfcManager.writePreset(key);
            if (success) {
                showToast(`Card programmed: ${roomPresets[key].name}`, 'success');
                setTimeout(() => { selectedPreset = key; updatePresetUI(); }, 600);
            } else {
                showToast('Write failed', 'error');
            }
        }

        async function logGroupReflection() {
            const text = document.getElementById('reflectionText').value.trim();
            if (!text && !voiceNoteBlob) {
                showToast('Add reflection text or voice note first', 'error');
                return;
            }
            if (!nfcManager) nfcManager = new NFCManager(currentProfile);
            try {
                const stamped = await nfcManager.stampRitual({
                    text: text || '(voice note only)',
                    preset: selectedPreset,
                    hasVoice: !!voiceNoteBlob
                });
                reflectionLogs.unshift(stamped);
                saveProfileData();
                updateReflectionLogsUI();
                nfcManager.updateTapCounterUI('nfcTapCounter');
                document.getElementById('reflectionText').value = '';
                showToast('Reflection logged & NFC ritual stamped', 'success');
            } catch(e) {
                showToast(e.message || 'NFC required to stamp ritual', 'error');
            }
        }

        // All other functions (stem mixer, processing, dropzone, etc.) remain exactly as in the previous v3 push
        // ... (performCinematicRetouch, buildStemMixer, handleRetouchClick, etc. unchanged) ...

        function initializeEverything() {
            initTailwind();
            initProfile();
            setupDropzone();
            setupKeyboardShortcuts();
            updatePresetUI();
            // ... rest of init ...
            console.log('%c[Juice Cinema v3] Modular NFCManager active. Clean, profile-aware, ritual-ready.', 'color:#52525b');
        }

        window.onload = initializeEverything;
    </script>
</body>
</html>
