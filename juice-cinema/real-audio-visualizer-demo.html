<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juice Cinema • Real Audio + Visualizer Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0f; color: #e5e7eb; }
        canvas { background: #111113; border: 1px solid #27272a; border-radius: 8px; }
    </style>
</head>
<body class="p-8 max-w-5xl mx-auto">
    <div class="mb-6">
        <h1 class="text-2xl font-semibold tracking-tight">Juice Cinema • Real Audio + Visualizer</h1>
        <p class="text-sm text-zinc-400 mt-1">Live AnalyserNode data • Overlaid waveforms • Isolation mode</p>
    </div>

    <div class="mb-4 flex flex-wrap items-center gap-x-3 gap-y-2">
        <button id="btnPlay" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm font-medium">
            ▶ Play Tone
        </button>
        <button id="btnStop" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm border border-zinc-700">
            ■ Stop
        </button>
        <button id="btnNormal" class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm border border-zinc-700">
            Normal View
        </button>
        <button id="btnIsolate" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm">
            Isolate Mode
        </button>
    </div>

    <canvas id="waveformCanvas" width="900" height="220" class="w-full max-w-[900px]"></canvas>

    <div class="mt-4 text-xs text-zinc-500">
        <strong>Legend:</strong> 
        <span class="text-[#d4af37]">■</span> Waveform &nbsp;&nbsp;
        <span class="text-emerald-400">■</span> Highlighted in Isolation mode
    </div>

    <script>
        // ==================== Minimal AudioEngine (with Analyser) ====================
        class AudioEngine {
            constructor() {
                this.context = null;
                this.masterGain = null;
                this.analysers = {};
            }

            getContext() {
                if (!this.context) {
                    this.context = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.context.createGain();
                    this.masterGain.gain.value = 0.9;
                    this.masterGain.connect(this.context.destination);
                }
                return this.context;
            }

            async resumeIfNeeded() {
                const ctx = this.getContext();
                if (ctx.state === 'suspended') await ctx.resume();
            }

            createAnalyser(name = 'main', fftSize = 2048) {
                const ctx = this.getContext();
                const analyser = ctx.createAnalyser();
                analyser.fftSize = fftSize;
                this.analysers[name] = analyser;
                return analyser;
            }

            getWaveformData(name = 'main') {
                const analyser = this.analysers[name];
                if (!analyser) return null;
                const data = new Float32Array(analyser.frequencyBinCount);
                analyser.getFloatTimeDomainData(data);
                return data;
            }
        }

        // ==================== Minimal WaveformVisualizer ====================
        class WaveformVisualizer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.width = canvas.width;
                this.height = canvas.height;
                this.isolationMode = false;
            }

            updateData(data) {
                const ctx = this.ctx;
                ctx.fillStyle = '#111113';
                ctx.fillRect(0, 0, this.width, this.height);

                if (!data) return;

                ctx.strokeStyle = this.isolationMode ? '#22c55e' : '#d4af37';
                ctx.lineWidth = 1.8;
                ctx.beginPath();

                const len = data.length;
                const step = this.width / len;
                const centerY = this.height / 2;

                for (let i = 0; i < len; i++) {
                    const x = i * step;
                    const y = centerY + (data[i] * centerY * 0.85);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            setIsolationMode(active) {
                this.isolationMode = active;
            }

            clear() {
                const ctx = this.ctx;
                ctx.fillStyle = '#111113';
                ctx.fillRect(0, 0, this.width, this.height);
            }
        }

        // ==================== Demo Logic ====================
        const canvas = document.getElementById('waveformCanvas');
        const visualizer = new WaveformVisualizer(canvas);
        const audioEngine = new AudioEngine();

        let oscillator = null;
        let analyser = null;
        let raf = null;

        function startLoop() {
            if (raf) cancelAnimationFrame(raf);
            function loop() {
                const data = audioEngine.getWaveformData('main');
                if (data) visualizer.updateData(data);
                raf = requestAnimationFrame(loop);
            }
            loop();
        }

        document.getElementById('btnPlay').onclick = async () => {
            await audioEngine.resumeIfNeeded();

            if (!analyser) {
                analyser = audioEngine.createAnalyser('main', 2048);
            }

            if (!oscillator) {
                const ctx = audioEngine.getContext();
                oscillator = ctx.createOscillator();
                oscillator.type = 'sawtooth';
                oscillator.frequency.value = 110;

                const gain = ctx.createGain();
                gain.gain.value = 0.25;

                oscillator.connect(gain);
                gain.connect(analyser);
                analyser.connect(audioEngine.masterGain || ctx.destination);

                oscillator.start();
            }

            startLoop();
        };

        document.getElementById('btnStop').onclick = () => {
            if (oscillator) {
                try { oscillator.stop(); } catch(e) {}
                oscillator = null;
            }
            if (raf) cancelAnimationFrame(raf);
            visualizer.clear();
        };

        document.getElementById('btnNormal').onclick = () => {
            visualizer.setIsolationMode(false);
        };

        document.getElementById('btnIsolate').onclick = () => {
            visualizer.setIsolationMode(true);
        };
    </script>
</body>
</html>
