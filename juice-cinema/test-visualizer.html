<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waveform Visualizer - Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0f; color: #e5e7eb; }
        canvas { background: #111113; border: 1px solid #27272a; border-radius: 8px; }
    </style>
</head>
<body class="p-8 max-w-5xl mx-auto">
    <div class="mb-6">
        <h1 class="text-2xl font-semibold tracking-tight">Waveform Visualizer - Proof of Concept</h1>
        <p class="text-sm text-zinc-400 mt-1">Dual overlaid waveforms (Original vs Processed) + Isolation mode demo</p>
    </div>

    <div class="mb-4 flex items-center gap-x-4">
        <button id="btnNormal" 
                class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm border border-zinc-700">
            Normal View
        </button>
        <button id="btnIsolate" 
                class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm">
            Isolate "Guitar" (Demo)
        </button>
        <button id="btnClear" 
                class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm border border-zinc-700">
            Clear
        </button>
    </div>

    <canvas id="waveformCanvas" width="900" height="220" class="w-full max-w-[900px]"></canvas>

    <div class="mt-4 text-xs text-zinc-500 max-w-md">
        <strong>Legend:</strong><br>
        <span class="text-[#d4af37]">■</span> Original track &nbsp;&nbsp;
        <span class="text-amber-400">■</span> Processed / Manipulated &nbsp;&nbsp;
        <span class="text-emerald-400">■</span> Highlighted in Isolation mode
    </div>

    <script type="module">
        import { WaveformVisualizer } from './src/ui/waveform-visualizer.js';

        const canvas = document.getElementById('waveformCanvas');
        const visualizer = new WaveformVisualizer(canvas, {
            originalColor: '#d4af37',
            processedColor: '#f59e0b',
            lineWidth: 1.8
        });

        // Generate fake waveform data (simulating real audio)
        function generateWaveform(length, complexity = 1) {
            const data = new Float32Array(length);
            for (let i = 0; i < length; i++) {
                const t = i / length;
                // Base sine wave + some harmonics and noise
                let val = Math.sin(t * Math.PI * 2 * 3) * 0.6;
                val += Math.sin(t * Math.PI * 2 * 7) * 0.25 * complexity;
                val += (Math.random() - 0.5) * 0.15;
                data[i] = Math.max(-1, Math.min(1, val));
            }
            return data;
        }

        // Create sample data
        const originalData = generateWaveform(900, 0.6);
        const processedData = generateWaveform(900, 1.3); // More complex = "manipulated"

        // Initial draw
        visualizer.updateData(originalData, processedData);

        // Button handlers
        document.getElementById('btnNormal').onclick = () => {
            visualizer.setIsolationMode(false);
            visualizer.updateData(originalData, processedData);
        };

        document.getElementById('btnIsolate').onclick = () => {
            visualizer.setIsolationMode(true, 'guitar');
            visualizer.updateData(originalData, processedData);
        };

        document.getElementById('btnClear').onclick = () => {
            visualizer.clear();
        };

        // Auto-refresh demo data every few seconds (simulating live audio)
        setInterval(() => {
            if (!visualizer.isolationMode) {
                const newProcessed = generateWaveform(900, 1.3 + Math.random() * 0.4);
                visualizer.updateData(originalData, newProcessed);
            }
        }, 2800);
    </script>
</body>
</html>
