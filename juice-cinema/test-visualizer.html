<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waveform Visualizer - Real Audio Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0f; color: #e5e7eb; }
        canvas { background: #111113; border: 1px solid #27272a; border-radius: 8px; }
    </style>
</head>
<body class="p-8 max-w-5xl mx-auto">
    <div class="mb-6">
        <h1 class="text-2xl font-semibold tracking-tight">Waveform Visualizer - Real Audio Demo</h1>
        <p class="text-sm text-zinc-400 mt-1">Live data from AudioEngine + AnalyserNode (no simulation)</p>
    </div>

    <div class="mb-4 flex flex-wrap items-center gap-x-3 gap-y-2">
        <button id="btnPlay" 
                class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm font-medium">
            ▶ Play Tone
        </button>
        <button id="btnStop" 
                class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm border border-zinc-700">
            ■ Stop
        </button>
        <button id="btnNormal" 
                class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-xl text-sm border border-zinc-700">
            Normal View
        </button>
        <button id="btnIsolate" 
                class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl text-sm">
            Isolate (Demo)
        </button>
    </div>

    <canvas id="waveformCanvas" width="900" height="220" class="w-full max-w-[900px]"></canvas>

    <div class="mt-4 text-xs text-zinc-500 max-w-md">
        <strong>Legend:</strong><br>
        <span class="text-[#d4af37]">■</span> Original (generated tone) &nbsp;&nbsp;
        <span class="text-amber-400">■</span> Processed path (same source for demo)
    </div>

    <script type="module">
        import { AudioEngine } from './src/core/audio-engine.js';
        import { WaveformVisualizer } from './src/ui/waveform-visualizer.js';

        const canvas = document.getElementById('waveformCanvas');
        const visualizer = new WaveformVisualizer(canvas);

        const audioEngine = new AudioEngine();
        let oscillator = null;
        let analyser = null;
        let animationFrame = null;

        function startVisualization() {
            if (animationFrame) cancelAnimationFrame(animationFrame);

            function draw() {
                const data = audioEngine.getWaveformData('main');
                if (data) {
                    visualizer.updateData(data, data);
                }
                animationFrame = requestAnimationFrame(draw);
            }
            draw();
        }

        function stopVisualization() {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
        }

        document.getElementById('btnPlay').onclick = async () => {
            await audioEngine.resumeIfNeeded();

            if (!analyser) {
                analyser = audioEngine.createAnalyser('main', 2048);
            }

            if (!oscillator) {
                const ctx = audioEngine.getContext();
                oscillator = ctx.createOscillator();
                oscillator.type = 'sawtooth';
                oscillator.frequency.value = 110;

                const gain = ctx.createGain();
                gain.gain.value = 0.3;

                oscillator.connect(gain);
                gain.connect(analyser);
                analyser.connect(audioEngine.masterGain || ctx.destination);

                oscillator.start();
            }

            startVisualization();
        };

        document.getElementById('btnStop').onclick = () => {
            if (oscillator) {
                try { oscillator.stop(); } catch(e) {}
                oscillator = null;
            }
            stopVisualization();
            visualizer.clear();
        };

        document.getElementById('btnNormal').onclick = () => {
            visualizer.setIsolationMode(false);
        };

        document.getElementById('btnIsolate').onclick = () => {
            visualizer.setIsolationMode(true, 'demo-stem');
        };
    </script>
</body>
</html>
